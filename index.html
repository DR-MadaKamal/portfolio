    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--bg:#0f0f1a;--bg-card:#181825;--text:#e4e4ec;--text-muted:#9494a8;--accent:#6cab96;--accent2:#e8a87c;--accent3:#8b8cb5}
      html{scroll-behavior:smooth;background:var(--bg);color:var(--text)}
      body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
      .navbar{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:16px 0;background:rgba(15,15,26,.85);-webkit-backdrop-filter:blur(20px) saturate(1.2);backdrop-filter:blur(20px) saturate(1.2);transition:.4s}
      .navbar .container{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:0 24px}
      .nav-logo{font-size:1.3rem;font-weight:700;color:var(--accent);text-decoration:none}
      .hero{min-height:100vh;display:flex;align-items:center;padding:120px 0 80px;position:relative}
      .hero .container{max-width:1200px;margin:0 auto;padding:0 24px}
      .hero-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:60px;align-items:center}
      .hero h1{font-size:2.8rem;font-weight:800;line-height:1.2;margin-bottom:20px;letter-spacing:-0.02em}
      .hero h1 .gradient-text{background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      .hero p{color:var(--text-muted);font-size:.95rem;line-height:1.8;margin-bottom:20px;max-width:540px}
      .hero-image{position:relative;display:flex;align-items:center;justify-content:center}
      .section-title{text-align:center;font-size:2rem;font-weight:700;margin-bottom:48px;position:relative}
      .section-title small{display:block;font-size:.8rem;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
      .app-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(108,171,150,.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,140,181,.06),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(232,168,124,.04),transparent 50%);pointer-events:none;z-index:0}
      .container{max-width:1200px;margin:0 auto;padding:0 24px;width:100%}
      .scroll-indicator{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;animation:bounce 2s infinite}
      @keyframes bounce{0%,20%,50%,80%,to{transform:translateX(-50%) translateY(0)}40%{transform:translateX(-50%) translateY(-8px)}60%{transform:translateX(-50%) translateY(-4px)}}
      @media(max-width:768px){.hero-grid{grid-template-columns:1fr;text-align:center}.hero p{margin:0 auto 20px}.navbar .container{padding:0 16px}.section-title{font-size:1.5rem;margin-bottom:32px}}
      .hire-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
      .hire-modal{background:var(--bg-card);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:40px;text-align:center;position:relative;width:100%;max-width:360px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
      .hire-modal h3{font-size:1.2rem;font-weight:600;margin-bottom:24px;color:var(--text)}
      .hire-options{display:flex;flex-direction:column;gap:12px}
      .hire-option{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-radius:12px;font-size:1rem;font-weight:600;text-decoration:none;transition:.25s;border:1px solid transparent;cursor:pointer;font-family:inherit}
      .hire-wa{background:#25D36620;color:#25D366;border-color:#25D36630}
      .hire-wa:hover{background:#25D366;color:#fff;border-color:#25D366}
      .hire-em{background:var(--accent)15;color:var(--accent);border-color:var(--accent)30}
      .hire-em:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
      .hire-x{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:4px}
      .hire-x:hover{color:var(--text)}
      @media(max-width:500px){.hire-modal{padding:28px 20px}.hire-modal h3{font-size:1rem}.hire-option{font-size:.9rem;padding:12px 16px}}
    </style>

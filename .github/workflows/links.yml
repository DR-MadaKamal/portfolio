name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './dist/**/*.html' './dist/**/*.xml' './dist/sitemap.xml'
